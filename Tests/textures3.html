<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebGL 3D Alleyway</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gl-matrix/2.8.1/gl-matrix-min.js"></script>
    <style>
        body { background-color: #121212; color: #ffffff; display: flex; flex-direction: column; align-items: center; font-family: sans-serif; margin: 0; padding: 10px; overflow: hidden; }
        canvas { background-color: #000; border: 1px solid #333; cursor: crosshair; }
        #instructions { margin-top: 10px; text-align: center; font-size: 14px; color: #aaa; }
    </style>
</head>
<body>

    <h2>3D Neon Alleyway</h2>
    <canvas id="glcanvas" width="1024" height="600"></canvas>
    <div id="instructions">
        <strong>CLICK the canvas</strong> to lock mouse and look around.<br>
        Press <strong>W, A, S, D</strong> to walk. Press <strong>ESC</strong> to unlock mouse.<br>
        <label>Puddle Blend Factor: <input type="range" id="blendSlider" min="0" max="1" step="0.01" value="0.58"></label>
    </div>

    <script>
        const canvas = document.getElementById("glcanvas");
        const gl = canvas.getContext("webgl2");
        gl.enable(gl.DEPTH_TEST); // Enable 3D depth!

        // ---------------------------------------------------------
        // 1. 3D SHADERS
        // ---------------------------------------------------------
        const vertexShaderSource = `#version 300 es
        layout(location = 0) in vec3 a_pos;
        layout(location = 1) in vec3 a_normal;
        layout(location = 2) in vec2 a_texCoord;
        
        out vec3 v_fragPos;
        out vec3 v_normal;
        out vec2 v_texCoord;
        
        uniform mat4 u_model;
        uniform mat4 u_view;
        uniform mat4 u_proj;
        
        void main() {
            vec4 worldPos = u_model * vec4(a_pos, 1.0);
            v_fragPos = worldPos.xyz;
            
            // Fix normals if the model is rotated/scaled
            v_normal = mat3(transpose(inverse(u_model))) * a_normal;
            v_texCoord = a_texCoord;
            
            gl_Position = u_proj * u_view * worldPos;
        }`;

        const fragmentShaderSource = `#version 300 es
        precision mediump float;
        
        in vec3 v_fragPos;
        in vec3 v_normal;
        in vec2 v_texCoord;
        
        out vec4 outColor;
        
        uniform sampler2D u_texBase; 
        uniform sampler2D u_texWet;  
        
        uniform float u_isWall;      // 1.0 = Wall, 0.0 = Floor
        uniform float u_blendFactor; // For the puddles
        
        uniform vec3 u_lightPos;
        uniform vec3 u_viewPos;
        
        void main() {
            vec3 norm = normalize(v_normal);
            vec3 lightDir = normalize(u_lightPos - v_fragPos);
            vec3 viewDir = normalize(u_viewPos - v_fragPos);
            vec3 reflectDir = reflect(-lightDir, norm);
            
            // Point Light Attenuation (Fades over distance)
            float distance = length(u_lightPos - v_fragPos);
            float attenuation = 1.0 / (1.0 + 0.09 * distance + 0.032 * (distance * distance));
            vec3 neonPink = vec3(1.0, 0.2, 0.8) * attenuation * 5.0; // Boosted brightness
            
            vec3 ambient, diffuse, specular;
            
            if (u_isWall > 0.5) {
                // --- WALL LOGIC ---
                vec4 texColor = texture(u_texBase, v_texCoord);
                // DARKEN THE BRICK TEXTURE HERE (Multiply by 0.25)
                vec3 darkenedBrick = texColor.rgb * 0.25; 
                
                ambient = darkenedBrick * 0.1;
                diffuse = neonPink * max(dot(norm, lightDir), 0.0) * darkenedBrick;
                
                // Dull reflection for rough brick
                float spec = pow(max(dot(viewDir, reflectDir), 0.0), 16.0);
                specular = neonPink * spec * 0.05; 
            } else {
                // --- WET FLOOR LOGIC ---
                vec3 col1 = texture(u_texBase, v_texCoord).rgb;
                vec3 col2 = texture(u_texWet, v_texCoord).rgb;
                vec3 baseColor = mix(col1, col2, u_blendFactor);
                
                float luminance = dot(baseColor, vec3(0.299, 0.587, 0.114));
                float puddleMask = smoothstep(0.05, 0.15, luminance); 
                
                ambient = baseColor * 0.05;
                
                // Diffuse
                vec3 finalDiffuse = baseColor * (1.0 - puddleMask * 0.3);
                diffuse = neonPink * max(dot(norm, lightDir), 0.0) * finalDiffuse;
                
                // Sharp Dynamic Reflection
                float currentShininess = mix(32.0, 1024.0, puddleMask);
                float spec = pow(max(dot(viewDir, reflectDir), 0.0), currentShininess);
                specular = neonPink * spec * (0.5 + puddleMask * 3.0);
            }
            
            outColor = vec4(ambient + diffuse + specular, 1.0);
        }`;

        function compileShader(type, source) {
            const shader = gl.createShader(type);
            gl.shaderSource(shader, source);
            gl.compileShader(shader);
            return shader;
        }

        const program = gl.createProgram();
        gl.attachShader(program, compileShader(gl.VERTEX_SHADER, vertexShaderSource));
        gl.attachShader(program, compileShader(gl.FRAGMENT_SHADER, fragmentShaderSource));
        gl.linkProgram(program);

        // ---------------------------------------------------------
        // 2. GEOMETRY (Floor and Wall)
        // ---------------------------------------------------------
        // Format: X, Y, Z,   NX, NY, NZ,   U, V
        const floorVerts = new Float32Array([
            // Floor spreading on X and Z axis. Normal faces Up (Y=1)
            -4.0, 0.0,  2.0,   0, 1, 0,   0.0, 0.0,
             4.0, 0.0,  2.0,   0, 1, 0,   2.0, 0.0, // U goes to 2.0 to repeat texture
            -4.0, 0.0,-15.0,   0, 1, 0,   0.0, 4.0, // V goes to 4.0 to repeat texture down the alley
             4.0, 0.0,-15.0,   0, 1, 0,   2.0, 4.0
        ]);

        const wallVerts = new Float32Array([
            // Left wall. Triples the height (Y goes to 12.0). 
            // V goes to 3.0 to stack the texture 3 times perfectly.
            -4.0,  0.0,  2.0,   1, 0, 0,   0.0, 0.0,
            -4.0, 12.0,  2.0,   1, 0, 0,   0.0, 3.0,
            -4.0,  0.0,-15.0,   1, 0, 0,   4.0, 0.0, 
            -4.0, 12.0,-15.0,   1, 0, 0,   4.0, 3.0
        ]);

        function createBuffer(data) {
            const vao = gl.createVertexArray();
            gl.bindVertexArray(vao);
            const vbo = gl.createBuffer();
            gl.bindBuffer(gl.ARRAY_BUFFER, vbo);
            gl.bufferData(gl.ARRAY_BUFFER, data, gl.STATIC_DRAW);
            gl.enableVertexAttribArray(0); gl.vertexAttribPointer(0, 3, gl.FLOAT, false, 32, 0); // Pos
            gl.enableVertexAttribArray(1); gl.vertexAttribPointer(1, 3, gl.FLOAT, false, 32, 12); // Norm
            gl.enableVertexAttribArray(2); gl.vertexAttribPointer(2, 2, gl.FLOAT, false, 32, 24); // UV
            return vao;
        }

        const floorVAO = createBuffer(floorVerts);
        const wallVAO = createBuffer(wallVerts);

        // ---------------------------------------------------------
        // 3. TEXTURE LOADING
        // ---------------------------------------------------------
        function loadTexture(url) {
            const texture = gl.createTexture();
            gl.bindTexture(gl.TEXTURE_2D, texture);
            gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, 1, 1, 0, gl.RGBA, gl.UNSIGNED_BYTE, new Uint8Array([0, 0, 0, 255]));
            const img = new Image();
            img.src = url;
            img.onload = () => {
                gl.bindTexture(gl.TEXTURE_2D, texture);
                gl.pixelStorei(gl.UNPACK_FLIP_Y_WEBGL, true);
                gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, img);
                gl.generateMipmap(gl.TEXTURE_2D);
                // Allow the texture to tile/repeat infinitely
                gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.REPEAT);
                gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.REPEAT);
            };
            return texture;
        }

        const texWetBase = loadTexture("../assets/textures/textures/Wet2.jpg");
        const texWetOverlay = loadTexture("../assets/textures/textures/Wet3.jpg");
        // UPDATE THIS PATH to your actual brick texture!
        const texBrick = loadTexture("../assets/textures/textures/brickwall.jpg"); 

        // ---------------------------------------------------------
        // 4. CAMERA SYSTEM
        // ---------------------------------------------------------
        // Start exactly 4.0 units high
        let camPos = vec3.fromValues(0.0, 3.0, 0.0);
        let camFront = vec3.fromValues(0.0, 0.0, -1.0);
        let camUp = vec3.fromValues(0.0, 1.0, 0.0);
        let pitch = 0, yaw = -90;
        
        let keys = {};
        window.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
        window.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

        // Mouse look around (Requires clicking canvas)
        canvas.addEventListener("click", () => canvas.requestPointerLock());
        document.addEventListener("mousemove", (e) => {
            if (document.pointerLockElement === canvas) {
                yaw += e.movementX * 0.1;
                pitch -= e.movementY * 0.1;
                if (pitch > 89.0) pitch = 89.0;
                if (pitch < -89.0) pitch = -89.0;

                let front = vec3.create();
                front[0] = Math.cos(glMatrix.toRadian(yaw)) * Math.cos(glMatrix.toRadian(pitch));
                front[1] = Math.sin(glMatrix.toRadian(pitch));
                front[2] = Math.sin(glMatrix.toRadian(yaw)) * Math.cos(glMatrix.toRadian(pitch));
                vec3.normalize(camFront, front);
            }
        });

        // ---------------------------------------------------------
        // 5. RENDER LOOP
        // ---------------------------------------------------------
        const uModel = gl.getUniformLocation(program, "u_model");
        const uView = gl.getUniformLocation(program, "u_view");
        const uProj = gl.getUniformLocation(program, "u_proj");
        const uLightPos = gl.getUniformLocation(program, "u_lightPos");
        const uViewPos = gl.getUniformLocation(program, "u_viewPos");
        const uIsWall = gl.getUniformLocation(program, "u_isWall");
        const uBlend = gl.getUniformLocation(program, "u_blendFactor");

        const slider = document.getElementById("blendSlider");
        
        // Static neon light position hovering in the middle of the alley
        const lightPos = vec3.fromValues(-1.5, 1.5, -5.0); 
        
        let lastTime = 0;

        function draw(time) {
            let deltaTime = (time - lastTime) * 0.001;
            lastTime = time;

            // Handle Camera Movement
            // Handle Camera Movement (Locked to a flat plane)
            let speed = 2.5 * deltaTime;
            
            // Flatten the forward vector so we don't fly up/down
            let flatFront = vec3.fromValues(camFront[0], 0.0, camFront[2]);
            vec3.normalize(flatFront, flatFront);

            if (keys['w']) vec3.scaleAndAdd(camPos, camPos, flatFront, speed);
            if (keys['s']) vec3.scaleAndAdd(camPos, camPos, flatFront, -speed);
            if (keys['a']) {
                let right = vec3.create();
                vec3.cross(right, flatFront, camUp);
                vec3.normalize(right, right);
                vec3.scaleAndAdd(camPos, camPos, right, -speed);
            }
            if (keys['d']) {
                let right = vec3.create();
                vec3.cross(right, flatFront, camUp);
                vec3.normalize(right, right);
                vec3.scaleAndAdd(camPos, camPos, right, speed);
            }

            // Hard-lock the camera height every single frame just to be safe
            camPos[1] = 3.0;

            gl.clearColor(0.02, 0.02, 0.02, 1.0);
            gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);
            gl.useProgram(program);

            // Set Matrices
            let proj = mat4.create();
            mat4.perspective(proj, glMatrix.toRadian(60), canvas.width / canvas.height, 0.1, 100.0);
            let view = mat4.create();
            let center = vec3.create();
            vec3.add(center, camPos, camFront);
            mat4.lookAt(view, camPos, center, camUp);
            let model = mat4.create(); // Identity matrix (no rotation/scale needed right now)

            gl.uniformMatrix4fv(uProj, false, proj);
            gl.uniformMatrix4fv(uView, false, view);
            gl.uniformMatrix4fv(uModel, false, model);
            
            gl.uniform3fv(uLightPos, lightPos);
            gl.uniform3fv(uViewPos, camPos);
            gl.uniform1f(uBlend, parseFloat(slider.value));

            // --- DRAW FLOOR ---
            gl.uniform1f(uIsWall, 0.0); // Tell shader we are drawing the floor
            gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D, texWetBase); gl.uniform1i(gl.getUniformLocation(program, "u_texBase"), 0);
            gl.activeTexture(gl.TEXTURE1); gl.bindTexture(gl.TEXTURE_2D, texWetOverlay); gl.uniform1i(gl.getUniformLocation(program, "u_texWet"), 1);
            gl.bindVertexArray(floorVAO);
            gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

            // --- DRAW WALL ---
            gl.uniform1f(uIsWall, 1.0); // Tell shader we are drawing the wall
            gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D, texBrick); gl.uniform1i(gl.getUniformLocation(program, "u_texBase"), 0);
            gl.bindVertexArray(wallVAO);
            gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

            requestAnimationFrame(draw);
        }
        
        requestAnimationFrame(draw);
    </script>
</body>
</html>
