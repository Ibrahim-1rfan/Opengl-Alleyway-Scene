<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D House Viewer</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; }
        #ui-container {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.9);
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            z-index: 100;
        }
    </style>
</head>
<body>

    <div id="ui-container">
        <label for="scaleSlider"><strong>Scale House:</strong> <span id="scaleValue">1.0</span>x</label><br>
        <input type="range" id="scaleSlider" min="0.1" max="5" step="0.1" value="1" style="width: 200px;">
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">

        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        // 1. Core Scene Setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

                // --- FIRST PERSON CONTROLS ---
        const controls = new PointerLockControls(camera, document.body);
        scene.add(controls.getObject());

        // You must click the screen to activate "look around" mode
        document.addEventListener('click', () => {
            controls.lock();
        });

        // Optional: Limit how far up/down the player can look (Prevents bending backward)
        controls.maxPolarAngle = Math.PI / 1.5; // Don't look too far down
        controls.minPolarAngle = Math.PI / 3;   // Don't look too far up

        // --- WASD MOVEMENT SETUP ---
        const keys = { w: false, a: false, s: false, d: false };

        window.addEventListener('keydown', (event) => {
            const key = event.key.toLowerCase();
            if (keys.hasOwnProperty(key)) keys[key] = true;
        });

        window.addEventListener('keyup', (event) => {
            const key = event.key.toLowerCase();
            if (keys.hasOwnProperty(key)) keys[key] = false;
        });

        const moveSpeed = 0.15; // Walking speed

        // 2. Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 1.5);
        scene.add(ambientLight);
        const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
        directionalLight.position.set(10, 20, 10);
        scene.add(directionalLight);

        // --- NEW ALLEYWAY ENVIRONMENT ---
        const texLoader = new THREE.TextureLoader();
        
        // 1. THE WET FLOOR
        const floorTex = texLoader.load('../assets/textures/textures/Wet2.jpg');
        floorTex.wrapS = THREE.RepeatWrapping;
        floorTex.wrapT = THREE.RepeatWrapping;
        floorTex.repeat.set(15, 15); // Repeat the texture infinitely

        const floorGeo = new THREE.PlaneGeometry(150, 150);
        const floorMat = new THREE.MeshStandardMaterial({ 
            map: floorTex, 
            roughness: 0.1, // Low roughness = highly reflective/wet look
            metalness: 0.3
        });
        const floorMesh = new THREE.Mesh(floorGeo, floorMat);
        floorMesh.rotation.x = -Math.PI / 2; // Lay it perfectly flat on the ground
        floorMesh.position.y = -4.9; // Slightly below the house's base to avoid z-fighting
        scene.add(floorMesh);

        // 2. THE BRICK WALL
        const brickTex = texLoader.load('../assets/textures/textures/brickwall.jpg');
        brickTex.wrapS = THREE.RepeatWrapping;
        brickTex.wrapT = THREE.RepeatWrapping;
        brickTex.repeat.set(10, 3); // Stretch down the alley, stack 3 times high

        const wallGeo = new THREE.PlaneGeometry(100, 30); 
        const wallMat = new THREE.MeshStandardMaterial({ 
            map: brickTex,
            color: 0x999999, // Darken the brick significantly so it isn't too bright
            roughness: 0.9,  // High roughness = dull, matte brick
            metalness: 0.0
        });
        const wallMesh = new THREE.Mesh(wallGeo, wallMat);
        
        // Position it forming an alleyway next to where the door is
        // You may need to tweak the X value (currently 25) depending on the exact size of your house model
        wallMesh.position.set(15, 5, 0); 
        wallMesh.rotation.y = -Math.PI / 2; // Face towards the house
        scene.add(wallMesh);


        const brickTex3 = texLoader.load('../assets/models/textures/redbrick.jpg');
        brickTex3.wrapS = THREE.RepeatWrapping;
        brickTex3.wrapT = THREE.RepeatWrapping;
        brickTex3.repeat.set(10, 3); // Stretch down the alley, stack 3 times high

        const wallGeo3 = new THREE.PlaneGeometry(100, 30); 
        const wallMat3 = new THREE.MeshStandardMaterial({ 
            map: brickTex3,
            color: 0x999999, // Darken the brick significantly so it isn't too bright
            roughness: 0.9,  // High roughness = dull, matte brick
            metalness: 0.0
        });
        const wallMesh2 = new THREE.Mesh(wallGeo3, wallMat3);
        
        // Position it forming an alleyway next to where the door is
        // You may need to tweak the X value (currently 25) depending on the exact size of your house model
        wallMesh2.position.set(15, 5, 12.5); 
        wallMesh2.rotation.y = -Math.PI; // Face towards the house
        scene.add(wallMesh2);

        // small back wall at the end of the alley
         const brickTex2 = texLoader.load('../assets/textures/textures/brickwall.jpg');
        brickTex2.wrapS = THREE.RepeatWrapping;
        brickTex2.wrapT = THREE.RepeatWrapping;
        brickTex2.repeat.set(10, 3); // Stretch down the alley, stack 3 times high

        const wallGeo2 = new THREE.PlaneGeometry(8, 6); 
        const wallMat2 = new THREE.MeshStandardMaterial({ 
            map: brickTex2,
            color: 0x999999, // Darken the brick significantly so it isn't too bright
            roughness: 0.9,  // High roughness = dull, matte brick
            metalness: 0.0
        });
        const wallMesh3 = new THREE.Mesh(wallGeo2, wallMat2);
        
        // Position it forming an alleyway next to where the door is
        // You may need to tweak the X value (currently 25) depending on the exact size of your house model
        wallMesh3.position.set(-8, -3, 9); 
        wallMesh3.rotation.y = Math.PI / 2; // Face towards the house
        scene.add(wallMesh3);


        // 3. Load the Models
        let houseWrapper;
        const loader = new GLTFLoader();

        // Load House First
        loader.load(
            '../assets/models/house_scene.gltf',
            function (gltf) {
                const rawModel = gltf.scene;
                houseWrapper = new THREE.Group();
                scene.add(houseWrapper);

                const box = new THREE.Box3().setFromObject(rawModel);
                const center = box.getCenter(new THREE.Vector3());
                const size = box.getSize(new THREE.Vector3());

                // Center the house
                rawModel.position.set(-center.x, -center.y, -center.z);
                houseWrapper.add(rawModel);

                const maxDim = Math.max(size.x, size.y, size.z);
                
                camera.position.set(10, -2.0, 0);

                // Now that the house is loaded and centered, attach the sign
                loadSign(size);
                // Also load the telephone
                loadTelephone(size);
                // And the door
                loadDoor(size);
                // And the open sign
                loadOpen(size);
                // And the lamp
                loadLamp(size);
                loadLamp2(size);
                // And the dumpster
                loadDumpster(size);
                // And the corpse
                loadCorpse(size);
                // And the tape
                loadTape(size);
                // And the barrier
                loadbarrier(size);
                // Add the lamppost
                loadLamppost(size);
            },
            undefined,
            function (error) { console.error('Error loading house:', error); }
        );

        // Function to load and attach the sign
        function loadSign(houseSize) {
            loader.load(
                '../assets/models/sign_scene.gltf',
                function (gltf) {
                    const signModel = gltf.scene;

                    // --- ADJUST SIGN SCALE HERE ---
                    // Try 0.01, 0.05, or 0.005 depending on how huge the original file is
                    const signScale = 0.004; 
                    signModel.scale.set(signScale, signScale, signScale);

                    // --- ADJUST SIGN POSITION HERE ---
                    // X: Left wall is negative X. We start at half the house width.
                    // Y: Up/Down. Tweak this to move it into the rectangular design.
                    // Z: Forward/Backward along the left wall.
                    const leftWallX = (houseSize.x / 2) + houseSize.x -  16.9; // +0.2 to avoid clipping inside the wall
                    const heightY = houseSize.y - 9.0; // Start at half the house height
                    const depthZ = 0.0;  

                    signModel.position.set(leftWallX, heightY, depthZ);

                    // --- ROTATE SIGN ---
                    // Rotate 90 degrees (-Math.PI / 2) so the front of the sign faces outward from the left wall
                    signModel.rotation.y = Math.PI / 2; // Slightly tilt towards the camera for better visibility
                    // Tilts the top of the sign forward or backward away from the wall
                    signModel.rotation.x = 0.0;
                    signModel.rotation.z = -0.05;
                    // Attach to the house wrapper so scaling the house scales the sign too
                    houseWrapper.add(signModel);
                },
                undefined,
                function (error) { console.error('Error loading sign:', error); }
            );
        }

        // Function to load and attach the telephone
        function loadTelephone(houseSize) {
            loader.load(
                '../assets/models/telephone_scene.gltf', // Your newly uploaded file
                function (gltf) {
                    const phoneModel = gltf.scene;

                    // --- 1. REALLY SMALL SCALE ---
                    const phoneScale = 0.03; // Try 0.005, 0.0005, or 0.0001 if still too big/small
                    phoneModel.scale.set(phoneScale, phoneScale, phoneScale);

                    // --- 2. CREATE A WRAPPER FOR THE PHONE ---
                    const phoneGroup = new THREE.Group();

                    // --- 3. POSITION THE PHONE ---
                    // Example: Putting it on the FRONT wall (near a door perhaps?)
                   const leftWallX = (houseSize.x / 2) + houseSize.x -  15.9; // +0.2 to avoid clipping inside the wall
                    const heightY = houseSize.y - 12.5; // Start at half the house height
                    const depthZ = 2.0; 
                    
                    phoneGroup.position.set(leftWallX, heightY, depthZ);

                    // --- 4. RESET PHONE INTERNAL COORDINATES ---
                    // This forces the phone to forget any weird axes the creator gave it
                    phoneModel.position.set(0, 0, 0);
                    // If the phone is facing sideways or backwards internally, fix it here:
                    // phoneModel.rotation.set(0, Math.PI / 2, 0); // (Uncomment and change if needed)

                    // Put the phone inside our clean wrapper
                    phoneGroup.add(phoneModel);

                    // --- 5. ROTATE GROUP FLUSH TO WALL ---
                    // If placing on the FRONT wall: try 0 or Math.PI (180 degrees)
                    // If placing on the SIDE wall: try Math.PI / 2 or -Math.PI / 2 (90 degrees)
                    phoneGroup.rotation.y = Math.PI / 2; // Adjust this based on the wall you choose and how the model is oriented

                    // Add the group to the house so it scales and moves with it
                    houseWrapper.add(phoneGroup);
                },
                undefined,
                function (error) { console.error('Error loading telephone:', error); }
            );
        }

        // Function to load and attach the door
        function loadDoor(houseSize) {
            loader.load(
                '../assets/models/door_scene.gltf', // Your door file
                function (gltf) {
                    const doorModel = gltf.scene;

                    // --- 1. SET SCALE ---
                    // Starting with 0.01. Adjust up/down if it looks too small or huge.
                    const doorScale = 0.018; 
                    doorModel.scale.set(doorScale, doorScale, doorScale);

                    // --- 2. CREATE A WRAPPER FOR THE DOOR ---
                    const doorGroup = new THREE.Group();

                    // --- 3. POSITION THE DOOR NEXT TO THE PHONE ---
                    const leftWallX = (houseSize.x / 2) + houseSize.x -  15.9; // +0.2 to avoid clipping inside the wall
                    const heightY = houseSize.y - 10.6; // Start at half the house height
                    const depthZ = 0.0; 
                    
                    doorGroup.position.set(leftWallX, heightY, depthZ);

                    // --- 4. RESET INTERNAL COORDINATES ---
                    // Forcing the door to forget its creator's internal axes
                    doorModel.position.set(0, 0, 0);
                    doorModel.rotation.set(0, 0, 0);

                    doorGroup.add(doorModel);

                    // --- 5. ROTATE FLUSH TO WALL ---
                    // Keeps it facing straight out on the front wall
                    doorGroup.rotation.y = Math.PI / 2; 
                    
                    // (Optional) If the door is facing backward, change to: Math.PI
                    // (Optional) If the door is facing sideways, change to: Math.PI / 2 or -Math.PI / 2

                    // Attach to the house wrapper
                    houseWrapper.add(doorGroup);
                },
                undefined,
                function (error) { console.error('Error loading door:', error); }
            );
        }

        // Function to load and attach the door
        function loadOpen(houseSize) {
            loader.load(
                '../assets/models/neon_open_scene.gltf', // Your door file
                function (gltf) {
                    const openModel = gltf.scene;

                    // --- 1. SET SCALE ---
                    // Starting with 0.01. Adjust up/down if it looks too small or huge.
                    const openScale = 0.3; 
                    openModel.scale.set(openScale, openScale, openScale);

                    // --- 2. CREATE A WRAPPER FOR THE DOOR ---
                    const openGroup = new THREE.Group();

                    // --- 3. POSITION THE DOOR NEXT TO THE PHONE ---
                    const leftWallX = (houseSize.x / 2) + houseSize.x -  15.9; // +0.2 to avoid clipping inside the wall
                    const heightY = houseSize.y - 9.8; // Start at half the house height
                    const depthZ = 0.0; 
                    
                    openGroup.position.set(leftWallX, heightY, depthZ);

                    // --- 4. RESET INTERNAL COORDINATES ---
                    // Forcing the door to forget its creator's internal axes
                    openModel.position.set(0, 0, 0);
                    openModel.rotation.set(0, 0, 0);

                    openGroup.add(openModel);

                    // --- 5. ROTATE FLUSH TO WALL ---
                    // Keeps it facing straight out on the front wall
                    openGroup.rotation.y = 0; 
                    
                    // (Optional) If the door is facing backward, change to: Math.PI
                    // (Optional) If the door is facing sideways, change to: Math.PI / 2 or -Math.PI / 2

                    // Attach to the house wrapper
                    houseWrapper.add(openGroup);
                },
                undefined,
                function (error) { console.error('Error loading open sign:', error); }
            );
        }

        // Function to load and attach the lamp
        function loadLamp(houseSize) {
            loader.load(
                '../assets/models/lamp_scene.gltf', // Your lamp file
                function (gltf) {
                    const lampModel = gltf.scene;

                    // --- 1. SET SCALE ---
                    // Starting with 0.01. Adjust up/down if it looks too small or huge.
                    const lampScale = 1.5; 
                    lampModel.scale.set(lampScale, lampScale, lampScale);

                    // --- 2. CREATE A WRAPPER FOR THE LAMP ---
                    const lampGroup = new THREE.Group();

                    // --- 3. POSITION THE LAMP NEXT TO THE PHONE ---
                    // If your phone is at X = 1.5, put the lamp at X = 0.0 or X = 3.0 to place it side-by-side
                    const positionX = 5;  // Move left/right along the wall
                    const positionY = 0.0;  // Placed at 0 so it rests on the ground
                    const positionZ = (houseSize.z / 2) - 1; // Matches the phone's front wall depth
                    
                    lampGroup.position.set(positionX, positionY, positionZ);

                    // --- 4. RESET INTERNAL COORDINATES ---
                    // Forcing the lamp to forget its creator's internal axes
                    lampModel.position.set(0, 0, 0);
                    lampModel.rotation.set(0, 0, 0);

                    lampGroup.add(lampModel);

                    // --- 5. ROTATE FLUSH TO WALL ---
                    // Keeps it facing straight out on the front wall
                    lampGroup.rotation.y = 0; 
                    
                    // (Optional) If the lamp is facing backward, change to: Math.PI
                    // (Optional) If the lamp is facing sideways, change to: Math.PI / 2 or -Math.PI / 2
                    lampGroup.rotation.x = -Math.PI / 2; // Adjust this based on the wall you choose and how the model is oriented

                    // Attach to the house wrapper
                    houseWrapper.add(lampGroup);
                },
                undefined,
                function (error) { console.error('Error loading lamp:', error); }
            );
        }

         // Function to load and attach the lamp
        function loadLamp2(houseSize) {
            loader.load(
                '../assets/models/lamp_scene.gltf', // Your lamp file
                function (gltf) {
                    const lampModel = gltf.scene;

                    // --- 1. SET SCALE ---
                    // Starting with 0.01. Adjust up/down if it looks too small or huge.
                    const lampScale = 1.5; 
                    lampModel.scale.set(lampScale, lampScale, lampScale);

                    // --- 2. CREATE A WRAPPER FOR THE LAMP ---
                    const lampGroup = new THREE.Group();

                    // --- 3. POSITION THE LAMP NEXT TO THE PHONE ---
                    // If your phone is at X = 1.5, put the lamp at X = 0.0 or X = 3.0 to place it side-by-side
                    const positionX = -5;  // Move left/right along the wall
                    const positionY = 0.0;  // Placed at 0 so it rests on the ground
                    const positionZ = (houseSize.z / 2) - 1; // Matches the phone's front wall depth
                    
                    lampGroup.position.set(positionX, positionY, positionZ);

                    // --- 4. RESET INTERNAL COORDINATES ---
                    // Forcing the lamp to forget its creator's internal axes
                    lampModel.position.set(0, 0, 0);
                    lampModel.rotation.set(0, 0, 0);

                    lampGroup.add(lampModel);

                    // --- 5. ROTATE FLUSH TO WALL ---
                    // Keeps it facing straight out on the front wall
                    lampGroup.rotation.y = 0; 
                    
                    // (Optional) If the lamp is facing backward, change to: Math.PI
                    // (Optional) If the lamp is facing sideways, change to: Math.PI / 2 or -Math.PI / 2
                    lampGroup.rotation.x = -Math.PI / 2; // Adjust this based on the wall you choose and how the model is oriented

                    // Attach to the house wrapper
                    houseWrapper.add(lampGroup);
                },
                undefined,
                function (error) { console.error('Error loading lamp:', error); }
            );
        }

         function loadDumpster(houseSize) {
            loader.load(
                '../assets/models/dumpster_scene.gltf', // Your dumpster file
                function (gltf) {
                    const dumpsterModel = gltf.scene;

                    // --- 1. SET SCALE ---
                    // Starting with 0.01. Adjust up/down if it looks too small or huge.
                    const dumpsterScale = 1.5; 
                    dumpsterModel.scale.set(dumpsterScale, dumpsterScale, dumpsterScale);

                    // --- 2. CREATE A WRAPPER FOR THE DUMPSTER ---
                    const dumpsterGroup = new THREE.Group();

                    // --- 3. POSITION THE DUMPSTER NEXT TO THE PHONE ---
                    // If your phone is at X = 1.5, put the dumpster at X = 0.0 or X = 3.0 to place it side-by-side
                    const positionX = -6.7;  // Move left/right along the wall
                    const positionY = -4.9;  // Placed at 0 so it rests on the ground
                    const positionZ = 9; // Matches the phone's front wall depth

                    dumpsterGroup.position.set(positionX, positionY, positionZ);

                    // --- 4. RESET INTERNAL COORDINATES ---
                    // Forcing the dumpster to forget its creator's internal axes
                    dumpsterModel.position.set(0, 0, 0);
                    dumpsterModel.rotation.set(0, 0, 0);

                    dumpsterGroup.add(dumpsterModel);

                    // --- 5. ROTATE FLUSH TO WALL ---
                    // Keeps it facing straight out on the front wall
                    dumpsterGroup.rotation.y = Math.PI / 2; 
                    
                    // (Optional) If the dumpster is facing backward, change to: Math.PI
                    // (Optional) If the dumpster is facing sideways, change to: Math.PI / 2 or -Math.PI / 2
                    // dumpsterGroup.rotation.x = -Math.PI / 2; // Adjust this based on the wall you choose and how the model is oriented

                    // Attach to the house wrapper
                    houseWrapper.add(dumpsterGroup);
                },
                undefined,
                function (error) { console.error('Error loading dumpster:', error); }
            );
        }

        function loadCorpse(houseSize) {
            loader.load(
                '../assets/models/corpse_scene.gltf', // Your corpse file
                function (gltf) {
                    const corpseModel = gltf.scene;

                    // --- 1. SET SCALE ---
                    // Starting with 0.01. Adjust up/down if it looks too small or huge.
                    const corpseScale = 1.8; 
                    corpseModel.scale.set(corpseScale, corpseScale, corpseScale);

                    // --- 2. CREATE A WRAPPER FOR THE CORPSE ---
                    const corpseGroup = new THREE.Group();

                    // --- 3. POSITION THE CORPSE NEXT TO THE PHONE ---
                    // If your phone is at X = 1.5, put the corpse at X = 0.0 or X = 3.0 to place it side-by-side
                    const positionX = -4.2;  // Move left/right along the wall
                    const positionY = -4.9;  // Placed at 0 so it rests on the ground
                    const positionZ = 8.9; // Matches the phone's front wall depth

                    corpseGroup.position.set(positionX, positionY, positionZ);

                    // --- 4. RESET INTERNAL COORDINATES ---
                    // Forcing the corpse to forget its creator's internal axes
                    corpseModel.position.set(0, 0, 0);
                    corpseModel.rotation.set(0, 0, 0);

                    corpseGroup.add(corpseModel);

                    // --- 5. ROTATE FLUSH TO WALL ---
                    // Keeps it facing straight out on the front wall
                    // corpseGroup.rotation.y = Math.PI / 2; 
                    
                    // (Optional) If the corpse is facing backward, change to: Math.PI
                    // (Optional) If the corpse is facing sideways, change to: Math.PI / 2 or -Math.PI / 2
                    // corpseGroup.rotation.x = -Math.PI / 2; // Adjust this based on the wall you choose and how the model is oriented

                    // Attach to the house wrapper
                    houseWrapper.add(corpseGroup);
                },
                undefined,
                function (error) { console.error('Error loading corpse:', error); }
            );
        }

        function loadTape(houseSize) {
            loader.load(
                '../assets/models/tape_scene.gltf', // Your tape file
                function (gltf) {
                    const tapeModel = gltf.scene;

                    // --- 1. SET SCALE ---
                    // Starting with 0.01. Adjust up/down if it looks too small or huge.
                    const tapeScale = 180; 
                    tapeModel.scale.set(tapeScale, tapeScale, tapeScale);

                    // --- 2. CREATE A WRAPPER FOR THE TAPE ---
                    const tapeGroup = new THREE.Group();

                    // --- 3. POSITION THE TAPE NEXT TO THE PHONE ---
                    // If your phone is at X = 1.5, put the tape at X = 0.0 or X = 3.0 to place it side-by-side
                    const positionX = -53;  // Move left/right along the wall
                    const positionY = -19;  // Placed at 0 so it rests on the ground
                    const positionZ = 40; // Matches the phone's front wall depth

                    tapeGroup.position.set(positionX, positionY, positionZ);

                    // --- 4. RESET INTERNAL COORDINATES ---
                    // Forcing the tape to forget its creator's internal axes
                    tapeModel.position.set(0, 0, 0);
                    tapeModel.rotation.set(0, 0, 0);

                    tapeGroup.add(tapeModel);

                    // --- 5. ROTATE FLUSH TO WALL ---
                    // Keeps it facing straight out on the front wall
                    tapeGroup.rotation.y = Math.PI / 2; 
                    
                    // (Optional) If the tape is facing backward, change to: Math.PI
                    // (Optional) If the tape is facing sideways, change to: Math.PI / 2 or -Math.PI / 2
                    // tapeGroup.rotation.x = -Math.PI / 2; // Adjust this based on the wall you choose and how the model is oriented

                    // Attach to the house wrapper
                    houseWrapper.add(tapeGroup);
                },
                undefined,
                function (error) { console.error('Error loading tape:', error); }
            );
        }

         // Function to load and attach the barrier
        function loadbarrier(houseSize) {
            loader.load(
                '../assets/models/barrier_scene.gltf', // Your barrier file
                function (gltf) {
                    const barrierModel = gltf.scene;

                    // --- 1. SET SCALE ---
                    // Starting with 0.01. Adjust up/down if it looks too small or huge.
                    const barrierScale = 0.5; 
                    barrierModel.scale.set(barrierScale, 0.6, barrierScale);

                    // --- 2. CREATE A WRAPPER FOR THE BARRIER ---
                    const barrierGroup = new THREE.Group();

                    // --- 3. POSITION THE BARRIER NEXT TO THE PHONE ---
                    // If your phone is at X = 1.5, put the barrier at X = 0.0 or X = 3.0 to place it side-by-side
                    const positionX = 12;  // Move left/right along the wall
                    const positionY = -4.9;  // Placed at 0 so it rests on the ground
                    const positionZ = -(houseSize.z / 2); // Matches the phone's front wall depth

                    barrierGroup.position.set(positionX, positionY, positionZ);

                    // --- 4. RESET INTERNAL COORDINATES ---
                    // Forcing the barrier to forget its creator's internal axes
                    barrierModel.position.set(0, 0, 0);
                    barrierModel.rotation.set(0, 0, 0);

                    barrierGroup.add(barrierModel);

                    // --- 5. ROTATE FLUSH TO WALL ---
                    // Keeps it facing straight out on the front wall
                    barrierGroup.rotation.y = -Math.PI / 2; 
                    
                    // (Optional) If the barrier is facing backward, change to: Math.PI
                    // (Optional) If the barrier is facing sideways, change to: Math.PI / 2 or -Math.PI / 2
                    // barrierGroup.rotation.x = -Math.PI / 2; // Adjust this based on the wall you choose and how the model is oriented

                    // Attach to the house wrapper
                    houseWrapper.add(barrierGroup);
                },
                undefined,
                function (error) { console.error('Error loading barrier:', error); }
            );
        }

         // Function to load and attach the lamp
        function loadLamppost(houseSize) {
            loader.load(
                '../assets/models/lamppost_scene.gltf', // Your lamp file
                function (gltf) {
                    const lampModel = gltf.scene;

                    // --- 1. SET SCALE ---
                    // Starting with 0.01. Adjust up/down if it looks too small or huge.
                    const lampScale = 1.5; 
                    lampModel.scale.set(lampScale, lampScale, lampScale);

                    // --- 2. CREATE A WRAPPER FOR THE LAMP ---
                    const lampGroup = new THREE.Group();

                    // --- 3. POSITION THE LAMP NEXT TO THE PHONE ---
                    // If your phone is at X = 1.5, put the lamp at X = 0.0 or X = 3.0 to place it side-by-side
                    const positionX = 4.5;  // Move left/right along the wall
                    const positionY = -3.1;  // Placed at 0 so it rests on the ground
                    const positionZ = -(houseSize.z / 2) - 3; // Matches the phone's front wall depth
                    
                    lampGroup.position.set(positionX, positionY, positionZ);

                    // --- 4. RESET INTERNAL COORDINATES ---
                    // Forcing the lamp to forget its creator's internal axes
                    lampModel.position.set(0, 0, 0);
                    lampModel.rotation.set(0, 0, 0);

                    lampGroup.add(lampModel);

                    // --- 5. ROTATE FLUSH TO WALL ---
                    // Keeps it facing straight out on the front wall
                    lampGroup.rotation.y = 0; 
                    
                    // (Optional) If the lamp is facing backward, change to: Math.PI
                    // (Optional) If the lamp is facing sideways, change to: Math.PI / 2 or -Math.PI / 2
                    // lampGroup.rotation.x = -Math.PI / 2; // Adjust this based on the wall you choose and how the model is oriented

                    // Attach to the house wrapper
                    houseWrapper.add(lampGroup);
                },
                undefined,
                function (error) { console.error('Error loading lamp:', error); }
            );
        }


        // 4. Scaling Logic (House + Sign together)
        const slider = document.getElementById('scaleSlider');
        const scaleValueDisplay = document.getElementById('scaleValue');

        slider.addEventListener('input', (event) => {
            const scale = parseFloat(event.target.value);
            scaleValueDisplay.textContent = scale.toFixed(1);
            if (houseWrapper) {
                houseWrapper.scale.set(scale, scale, scale);
            }
        });

        
            // Define the boundaries of your alleyway.
                    // The boundaries you settled on
                const alleyBounds = {
                    minX: -1.75,  
                    maxX: 12.5,  
                    minY: -2.0,  // Forces camera head-height to stay exactly at -2.0
                    maxY: -2.0,   
                    minZ: -3.0, 
                    maxZ: 10.0    
                };

                                // The boundaries of the house itself (the solid object to avoid)
                // Tweak these so they line up exactly with your house's exterior walls
                const houseBounds = {
                    minX: -3.0, // Left wall of the house
                    maxX: 9.0,  // Right wall of the house
                    minZ: -8.0, // Back wall of the house
                    maxZ: 6.2   // Front wall of the house
                };

               // 5. Animation Loop
function animate() {
    requestAnimationFrame(animate);

    if (controls.isLocked === true) {
        // 1. SAVE PREVIOUS POSITION
        // We remember where we were before moving, in case we hit a wall
        const prevX = camera.position.x;
        const prevZ = camera.position.z;
        
        // 2. APPLY WASD MOVEMENT
        if (keys.w) controls.moveForward(moveSpeed);
        if (keys.s) controls.moveForward(-moveSpeed);
        if (keys.a) controls.moveRight(-moveSpeed);
        if (keys.d) controls.moveRight(moveSpeed);

        // 3. CLAMP TO OUTER ALLEY BOUNDS (The Fence)
        camera.position.x = THREE.MathUtils.clamp(camera.position.x, alleyBounds.minX, alleyBounds.maxX);
        camera.position.y = THREE.MathUtils.clamp(camera.position.y, alleyBounds.minY, alleyBounds.maxY);
        camera.position.z = THREE.MathUtils.clamp(camera.position.z, alleyBounds.minZ, alleyBounds.maxZ);

        // 4. CHECK HOUSE COLLISIONS (The Solid Object)
        // If the camera's new X and Z are BOTH inside the house box...
        const isInsideHouseX = camera.position.x > houseBounds.minX && camera.position.x < houseBounds.maxX;
        const isInsideHouseZ = camera.position.z > houseBounds.minZ && camera.position.z < houseBounds.maxZ;

        if (isInsideHouseX && isInsideHouseZ) {
            // ...we bumped into the house! Revert back to the previous safe position.
            camera.position.x = prevX;
            camera.position.z = prevZ;
        }
    }

    renderer.render(scene, camera);
}

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
